<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiểm Tra Trực Tuyến - Tiểu Học</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g50:#ECFDF5;--g100:#D1FAE5;--g200:#A7F3D0;--g300:#6EE7B7;--g400:#34D399;--g500:#10B981;--g600:#059669;--g700:#047857;--g800:#065F46;
--t50:#F0FDFA;--t100:#CCFBF1;--t200:#99F6E4;--t400:#2DD4BF;--t500:#14B8A6;--t600:#0D9488;
--s50:#F0F9FF;--s100:#E0F2FE;--s400:#38BDF8;--s500:#0EA5E9;
--a50:#FFFBEB;--a200:#FDE68A;--a400:#FBBF24;--a600:#D97706;
--r50:#FFF1F2;--r100:#FCE7F3;--r400:#FB7185;--r500:#F43F5E;
--x50:#F9FAFB;--x100:#F3F4F6;--x200:#E5E7EB;--x400:#9CA3AF;--x500:#6B7280;--x700:#374151;--x800:#1F2937;
--fd:'Montserrat',sans-serif;--fb:'Quicksand',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--fb);}
body{min-height:100vh;background:linear-gradient(160deg,var(--g50),var(--t50),var(--s50));}
h1,h2,h3,.hd{font-family:var(--fd);font-weight:800;}
button{cursor:pointer;border:none;outline:none;}
textarea,input,select{outline:none;font-family:var(--fb);}
::-webkit-scrollbar{width:7px;}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--t400),var(--g500));border-radius:99px;}::-webkit-scrollbar-track{background:var(--g50);}
@keyframes floatBee{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
@keyframes floatSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes selectPop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes starPop{0%{transform:scale(0) rotate(-45deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
@keyframes flyAcross{0%{transform:translateX(-50px)}50%{transform:translateX(30px) translateY(-18px)}100%{transform:translateX(-50px)}}
@keyframes progressStripe{0%{background-position:0 0}100%{background-position:40px 0}}
@keyframes aiPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 20px 8px rgba(16,185,129,.15)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.3)}50%{box-shadow:0 0 20px rgba(16,185,129,.5)}}
@keyframes checkmark{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

.nav-bar{position:sticky;top:0;z-index:40;padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(90deg,var(--g50),var(--t50),var(--g50));border-bottom:3px solid var(--g300);}
.nav-tabs{display:flex;padding:4px;border-radius:14px;gap:4px;background:var(--g100);border:2px solid var(--g200);}
.nav-tab{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:800;color:var(--g700);background:transparent;transition:all .2s;}
.nav-tab.active{background:white;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.nav-tab:hover:not(.active){background:rgba(255,255,255,.5);}
.deco{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.deco>div{position:absolute;}
.lobby-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;}
.lobby-card{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.08);max-width:480px;width:100%;padding:32px;text-align:center;z-index:10;border:3px solid var(--g300);animation:slideUp .6s ease-out;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{border-radius:16px;padding:14px 10px;border:2px solid;animation:slideUp .5s ease-out both;}
.stat-num{font-size:28px;font-weight:800;font-family:var(--fd);}
.stat-label{font-size:11px;font-weight:700;}
.btn-start{width:100%;padding:16px;border-radius:16px;font-size:20px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,var(--g500),var(--t500));box-shadow:0 8px 24px rgba(16,185,129,.35);transition:all .2s;animation:pulse2 2s ease-in-out infinite;}
.btn-start:hover{box-shadow:0 12px 32px rgba(16,185,129,.45);transform:translateY(-1px);}
.exam-hdr{position:sticky;top:0;z-index:30;padding:12px 16px;background:linear-gradient(90deg,var(--g50),var(--t50),var(--g50));border-bottom:3px solid var(--g300);backdrop-filter:blur(8px);}
.hdr-inner{max-width:800px;margin:0 auto;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.timer-box{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:14px;font-family:monospace;font-weight:800;font-size:18px;border:2px solid;}
.timer-ok{background:var(--g50);border-color:var(--g300);color:var(--g600);}
.timer-warn{background:var(--a50);border-color:var(--a200);color:var(--a600);}
.timer-danger{background:var(--r50);border-color:var(--r400);color:var(--r500);}
.prog-wrap{position:relative;height:22px;border-radius:99px;background:var(--g100);border:2px solid var(--g200);overflow:visible;}
.prog-fill{height:100%;border-radius:99px;transition:width .7s;background:repeating-linear-gradient(90deg,var(--g400),var(--g400) 10px,var(--t400) 10px,var(--t400) 20px);background-size:40px 100%;animation:progressStripe 1s linear infinite;}
.prog-bee{position:absolute;top:50%;transform:translateY(-50%);transition:left .7s;}
.prog-info{display:flex;justify-content:space-between;margin-top:4px;}
.prog-info span{font-size:12px;font-weight:700;color:var(--g700);}
.exam-body{max-width:800px;margin:0 auto;padding:16px 16px 100px;position:relative;z-index:10;}
.section-title{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--g800);margin:24px 0 12px;display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(255,255,255,.7);border-radius:14px;border-left:5px solid var(--g400);}
.qcard{background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.04);padding:0;margin-bottom:14px;border:2px solid var(--g200);transition:all .3s;overflow:hidden;}
.qcard.active{border-color:var(--g400);box-shadow:0 4px 24px rgba(16,185,129,.12);animation:glow 2s ease-in-out infinite;}
.qcard.submitted{border-color:var(--g300);background:var(--g50);}
.qcard-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.qcard-badges .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-right:4px;}
.badge-tn{background:var(--t100);color:var(--t600);}
.badge-tl{background:var(--r100);color:var(--r500);}
.badge-pts{background:var(--g100);color:var(--g700);border:1px solid var(--g200);}
.badge-sub{background:var(--s100);color:var(--s500);font-size:10px;}
.badge-done{background:var(--g400);color:white;font-size:11px;}
.qcard-qtext{padding:0 20px;font-family:var(--fd);font-size:20px;font-weight:700;line-height:1.5;color:var(--x800);}
.qcard-qtext .fill-input{display:inline-block;width:100px;margin:0 4px;padding:4px 10px;text-align:center;border:none;border-bottom:4px solid var(--g300);border-radius:10px;font-size:18px;font-weight:800;color:var(--g700);background:var(--g50);transition:all .3s;font-family:var(--fd);}
.qcard-qtext .fill-input:focus{border-bottom-color:var(--g500);background:var(--g100);}
.qcard-qtext .fill-input.filled{border-bottom-color:var(--t400);background:var(--t50);}
.qcard-answer{padding:12px 20px 20px;display:none;}
.qcard.active .qcard-answer{display:block;animation:fadeIn .3s ease-out;}
.options-list{display:flex;flex-direction:column;gap:10px;}
.opt-btn{width:100%;text-align:left;padding:14px;border-radius:14px;border:3px solid var(--x200);background:var(--x50);font-size:16px;font-weight:600;display:flex;align-items:center;gap:12px;transition:all .2s;color:var(--x700);}
.opt-btn:hover{border-color:var(--g300);background:var(--g50);}
.opt-btn.selected{border-color:var(--g400);background:var(--g50);color:var(--g700);animation:selectPop .4s ease;}
.opt-label{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:white;flex-shrink:0;}
.opt-check{margin-left:auto;color:var(--g500);font-weight:800;font-size:18px;}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tf-btn{padding:16px;border-radius:14px;border:3px solid var(--x200);font-size:18px;font-weight:800;text-align:center;transition:all .2s;background:var(--x50);color:var(--x700);}
.tf-btn:hover{border-color:var(--g300);background:var(--g50);}
.tf-btn.sel-t{border-color:var(--g400);background:var(--g50);color:var(--g600);}
.tf-btn.sel-f{border-color:var(--r400);background:var(--r50);color:var(--r500);}
.hint-box{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;background:var(--g50);border:1px solid var(--g200);margin-top:10px;}
.hint-box span{font-size:13px;font-weight:600;color:var(--g700);}
.essay-textarea{width:100%;height:140px;padding:14px;border:3px solid var(--x200);border-radius:14px;font-size:16px;resize:none;transition:all .3s;font-weight:600;color:var(--x800);}
.essay-textarea:focus{border-color:var(--g400);background:var(--g50);}
.btn-upload{margin-top:10px;width:100%;padding:14px;border-radius:14px;border:3px dashed var(--g300);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--g50);color:var(--g700);transition:all .2s;}
.btn-upload.uploaded{border-color:var(--t400);background:var(--t50);color:var(--t600);border-style:solid;}
.btn-do{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:white;background:linear-gradient(135deg,var(--g500),var(--t500));box-shadow:0 3px 12px rgba(16,185,129,.25);transition:all .2s;}
.btn-do:hover{transform:translateY(-1px);}
.btn-submit-q{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:white;background:linear-gradient(135deg,var(--g600),var(--g700));transition:all .2s;}
.btn-submitted{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:var(--g600);background:var(--g100);border:2px solid var(--g300);}
.submitted-check{display:inline-block;animation:checkmark .4s ease-out;}
.submit-bar{position:fixed;bottom:0;left:0;right:0;z-index:35;padding:12px 16px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:3px solid var(--g300);display:flex;align-items:center;justify-content:center;gap:16px;}
.btn-submit-all{padding:14px 32px;border-radius:14px;font-size:17px;font-weight:800;color:white;background:linear-gradient(135deg,var(--g500),var(--g600));box-shadow:0 4px 16px rgba(16,185,129,.3);transition:all .2s;}
.btn-submit-all:hover{transform:translateY(-1px);}
.result-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;background:linear-gradient(160deg,var(--g50),var(--t50),var(--s50));}
.result-card{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.08);max-width:440px;width:100%;padding:36px;text-align:center;z-index:10;border:3px solid var(--g300);animation:bounceIn .8s ease-out;}
.stars-row{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
.star-icon{font-size:48px;}.star-active{color:#FBBF24;animation:starPop .5s ease both;}.star-inactive{color:var(--x200);}
.score-box{border-radius:16px;padding:20px;margin-bottom:12px;background:linear-gradient(135deg,var(--g50),var(--t50));border:2px solid var(--g200);}
.score-num{font-size:48px;font-weight:800;font-family:var(--fd);color:var(--g700);}
.teacher-wrap{min-height:100vh;background:linear-gradient(180deg,var(--g50),var(--t50));}
.topbar{padding:16px 24px;background:rgba(255,255,255,.8);border-bottom:3px solid var(--g300);backdrop-filter:blur(8px);}
.topbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;background:linear-gradient(135deg,var(--g500),var(--t500));}
.tgrid{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media(max-width:900px){.tgrid,.ggrid{grid-template-columns:1fr !important;}}
.panel{background:rgba(255,255,255,.9);backdrop-filter:blur(6px);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.05);padding:24px;border:2px solid var(--g200);}
.panel-title{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--g800);display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.cfg-form{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.cfg-row{display:flex;gap:10px;}.cfg-row>*{flex:1;}
.cfg-f label{display:block;font-size:12px;font-weight:700;color:var(--g700);margin-bottom:4px;}
.cfg-f input,.cfg-f select{width:100%;padding:10px 12px;border:2px solid var(--g200);border-radius:10px;font-size:14px;font-weight:600;color:var(--g800);transition:all .2s;}
.cfg-f input:focus,.cfg-f select:focus{border-color:var(--g400);background:var(--g50);}
.drop-zone{border:3px dashed var(--g300);border-radius:16px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--g50);}
.drop-zone:hover{border-color:var(--g500);background:var(--g100);}
.drop-zone.has-file{border-color:var(--t400);background:var(--t50);}
.btn-parse{margin-top:16px;width:100%;padding:16px;border-radius:12px;font-size:17px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,var(--g500),var(--t500));}
.btn-parse:disabled{opacity:.6;}
.btn-save{display:flex;align-items:center;gap:8px;padding:10px 20px;font-weight:800;color:white;border-radius:12px;background:linear-gradient(135deg,var(--g500),var(--g600));}
.q-edit-card{padding:12px;border-radius:12px;border:2px solid var(--g200);background:var(--x50);margin-bottom:8px;}
.q-edit-card.editing{border-color:var(--g400);background:var(--g50);}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;}
.opt-preview{font-size:12px;padding:5px 10px;border-radius:8px;font-weight:600;}
.opt-preview.correct{background:var(--g100);color:var(--g700);border:1px solid var(--g300);}
.opt-preview.wrong{background:white;color:var(--x500);border:1px solid var(--x200);}
.opt-correct-btn{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--x200);background:white;color:var(--x400);}
.opt-correct-btn.correct{background:var(--g500);border-color:var(--g500);color:white;}
.ggrid{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:3fr 2fr;gap:24px;}
.student-tab{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:12px;font-size:14px;font-weight:700;background:var(--x100);color:var(--x500);border:2px solid transparent;transition:all .2s;}
.student-tab.active{background:var(--g100);color:var(--g700);border-color:var(--g300);}
.essay-tab{padding:8px 16px;border-radius:12px;font-size:14px;font-weight:800;background:rgba(255,255,255,.5);color:var(--x400);border:2px solid transparent;display:flex;align-items:center;gap:6px;transition:all .2s;}
.essay-tab.active{background:white;color:var(--g700);border-color:var(--g300);}
.answer-panel{background:rgba(255,255,255,.9);border-radius:16px;overflow:hidden;border:2px solid var(--g200);}
.answer-header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--g50);border-bottom:2px solid var(--g200);flex-wrap:wrap;gap:8px;}
.tool-btn{padding:8px;border-radius:8px;background:transparent;color:var(--g700);font-size:14px;transition:all .2s;}
.tool-btn:hover{background:var(--g100);}
.rubric-panel{background:rgba(255,255,255,.9);border-radius:16px;padding:20px;border:2px solid var(--g200);}
.rubric-item{background:var(--g50);border-radius:12px;padding:12px;margin-bottom:10px;}
.rubric-scores{display:flex;gap:6px;}
.rubric-score-btn{flex:1;padding:8px;border-radius:8px;font-size:14px;font-weight:800;border:2px solid var(--x200);background:white;color:var(--x500);transition:all .2s;}
.rubric-score-btn.a-max{background:var(--g500);border-color:var(--g500);color:white;}
.rubric-score-btn.a-mid{background:var(--a400);border-color:var(--a400);color:white;}
.rubric-score-btn.a-zero{background:var(--r400);border-color:var(--r400);color:white;}
.total-score-box{margin-top:14px;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--g50),var(--t50));border:2px solid var(--g200);}
.total-score-num{font-family:var(--fd);font-size:28px;font-weight:800;color:var(--g700);}
.comment-panel{background:rgba(255,255,255,.9);border-radius:16px;padding:20px;border:2px solid var(--g200);margin-top:16px;}
.comment-textarea{width:100%;height:80px;padding:12px;border:2px solid var(--g200);border-radius:12px;font-size:13px;resize:none;font-weight:600;}
.comment-textarea:focus{border-color:var(--g400);background:var(--g50);}
.canned-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.canned-tag{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;background:var(--g50);color:var(--g700);border:1px solid var(--g200);}
.canned-tag:hover{background:var(--g100);}
.btn-ai{width:100%;padding:14px;border-radius:12px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--g500),var(--t500));margin-bottom:12px;}
.btn-ai:disabled{opacity:.6;}.btn-ai.pulsing{animation:aiPulse 1.5s ease-in-out infinite;}
.btn-ai-all{background:linear-gradient(135deg,var(--t500),var(--s500));}
.btn-save-grade{width:100%;padding:14px;border-radius:12px;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;}
.btn-save-grade.unsaved{background:linear-gradient(135deg,var(--g500),var(--t500));color:white;}
.btn-save-grade.saved{background:var(--g100);color:var(--g600);border:2px solid var(--g300);}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.hidden{display:none !important;}.spinner{animation:spin 1s linear infinite;display:inline-block;}
.publish-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:100;padding:14px 28px;border-radius:14px;background:var(--g500);color:white;font-weight:800;font-size:15px;box-shadow:0 8px 30px rgba(16,185,129,.4);animation:slideUp .4s ease-out;}
/* Student table */
.stu-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;}
.stu-table th{background:var(--g600);color:white;padding:8px;font-weight:700;text-align:left;}
.stu-table td{padding:8px;border-bottom:1px solid var(--g200);}
.stu-table tr:hover td{background:var(--g50);}
.stu-table .del-btn{color:var(--r400);background:none;font-size:16px;padding:2px 6px;border-radius:6px;}
.stu-table .del-btn:hover{background:var(--r50);}
/* Grading dropdown */

let card='<div class="'+cls+'" id="qc-'+q.id+'"><div class="qcard-header"><div class="qcard-left"><div class="qcard-badges"><span class="badge '+(isTN?'badge-tn':'badge-tl')+'">'+(isTN?'📋 TN':'📝 TL')+' '+q.order+'</span><span class="badge badge-sub">'+subL[q.type]+'</span><span class="badge badge-pts">⭐ '+q.points+'đ</span>'+(state==='submitted'?'<span class="badge badge-done"><span class="submitted-check">✓</span> Đã nộp</span>':'')+'</div></div>';
if(state==='locked')card+='<button class="btn-do" onclick="activateQ(\''+q.id+'\')">📖 Bắt đầu làm</button>';
else if(state==='active')card+='<button class="btn-submit-q" onclick="submitQ(\''+q.id+'\')">📨 Nộp câu này</button>';
else card+='<button class="btn-submitted" onclick="activateQ(\''+q.id+'\')">✏️ Sửa lại</button>';
card+='</div>';
if(q.type==='fill_in'&&state==='active'){const parts=q.content.split('_____');const val=S.answers[q.id]||'';
card+='<div class="qcard-qtext">'+parts.map((p,i)=>{if(i<parts.length-1)return p+'<input type="text" class="fill-input '+(val?'filled':'')+'" value="'+val+'" placeholder="?" oninput="S.answers[\''+q.id+'\']=this.value;this.classList.toggle(\'filled\',!!this.value);">';return p;}).join('')+'</div>';
}else{card+='<div class="qcard-qtext">'+q.content+'</div>';}
card+='<div class="qcard-answer">';
if(q.type==='mcq'&&q.options){const lbl=['A','B','C','D'],cols=['#0D9488','#10B981','#0EA5E9','#F59E0B'];
card+='<div class="options-list">'+q.options.map((o,i)=>{const sel=S.answers[q.id]===o.id;return'<button class="opt-btn '+(sel?'selected':'')+'" onclick="S.answers[\''+q.id+'\']=\''+o.id+'\';renderS();"><span class="opt-label" style="background:'+(sel?cols[i]:'var(--x400)')+'">'+lbl[i]+'</span><span style="color:'+(sel?cols[i]:'var(--x700)')+'">'+o.text+'</span>'+(sel?'<span class="opt-check">✓</span>':'')+'</button>';}).join('')+'</div>';}
if(q.type==='true_false'){const sT=S.answers[q.id]==='true',sF=S.answers[q.id]==='false';card+='<div class="tf-btns"><button class="tf-btn '+(sT?'sel-t':'')+'" onclick="S.answers[\''+q.id+'\']=\'true\';renderS();">✅ Đúng</button><button class="tf-btn '+(sF?'sel-f':'')+'" onclick="S.answers[\''+q.id+'\']=\'false\';renderS();">❌ Sai</button></div>';}
if(q.type==='fill_in'&&q.hint)card+='<div class="hint-box"><span>💡</span><span>Gợi ý: '+q.hint+'</span></div>';
if(q.type==='essay'){card+='<textarea class="essay-textarea" placeholder="✍️ Nhập bài làm..." oninput="S.essayTexts[\''+q.id+'\']=this.value">'+(S.essayTexts[q.id]||'')+'</textarea>';

card+='</div></div>';return card;}

async function parseF(){
  const b=$('#bp');b.disabled=true;
  b.innerHTML='<span class="spinner">⏳</span> 🐝 Ong vàng đang đọc đề thi...';
  try {
    const file=T.fileObj;
    if(!file){showToast('⚠️ Không tìm thấy file!');return;}
    if(!CFG.appsScriptUrl){throw new Error('Chưa nhập Google Apps Script URL ở mục Thông tin bài kiểm tra!');}
    const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Lỗi đọc file'));r.readAsDataURL(file);});
    const ext=file.name.split('.').pop().toLowerCase();
    let mtype='application/pdf';
    if(['png','jpg','jpeg'].includes(ext))mtype='image/'+ext.replace('jpg','jpeg');
    b.innerHTML='<span class="spinner">⏳</span> 🐝 Đang gửi tới AI phân tích...';
    const resp=await fetch(CFG.appsScriptUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'parseExam',fileBase64:base64,mediaType:mtype,fileName:file.name})});
    const result=await resp.json();
    if(result.error)throw new Error(result.error);
    if(!result.questions||!result.questions.length)throw new Error('AI không tìm thấy câu hỏi trong file.');
    T.examData={examId:'exam_ai_'+Date.now(),title:result.title||ED.title,questions:result.questions};
    if(result.subject)CFG.subject=result.subject;
    if(result.grade)CFG.grade=result.grade;
    T.parsed=true;
    showToast('✅ Ong vàng đã phân tích '+T.examData.questions.length+' câu hỏi!');
    renderT();
  }catch(err){
    console.error('Parse Error:',err);
    b.innerHTML='<span class="spinner">⏳</span> Đang dùng dữ liệu mẫu...';
    setTimeout(()=>{T.examData=JSON.parse(JSON.stringify(ED));T.parsed=true;showToast('⚠️ '+(err.message||'Lỗi')+'. Đang dùng đề mẫu.');renderT();},1500);
  }
}

tnDetail+='<div class="result-row"><span>Câu '+q.order+': '+q.content.substring(0,40)+'...</span><span class="'+(correct?'result-correct':'result-wrong')+'">'+(correct?'✓ Đúng':'✗ Sai')+'</span></div>';});
tnDetail+='</div>';

el.innerHTML='<div class="teacher-wrap"><div class="topbar"><div class="topbar-inner"><div class="topbar-left"><div class="topbar-icon">📋</div><div><h1 class="hd" style="font-size:20px;color:var(--g800)">Chấm Bài Tự Luận</h1><p style="font-size:13px;font-weight:600;color:var(--t600)">'+ED.title+'</p></div></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
/* AI Grade All */
'<button class="btn-ai btn-ai-all '+(G.grading?'pulsing':'')+'" style="width:auto;margin:0;padding:8px 16px;font-size:13px" onclick="aiAll()" '+(G.grading?'disabled':'')+'>'+(G.grading?'<span class="spinner">⏳</span> AI chấm...':'🤖 AI Chấm Tất Cả')+'</button>'+
/* Student Dropdown */
'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:700;color:var(--g700)">📝 Chấm từng HS:</span><select class="grade-select" onchange="G.sel=+this.value;G.ei=0;renderG();">'+stuSubs.map((s,i)=>'<option value="'+i+'"'+(G.sel===i?' selected':'')+'>'+s.avatar+' '+s.studentName+'</option>').join('')+'</select></div>'+
'</div></div></div>'+
'<div style="max-width:1200px;margin:0 auto;padding:24px"><div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap">'+
/* Student tabs still shown */
stuSubs.map((s,i)=>'<button class="student-tab '+(G.sel===i?'active':'')+'" onclick="G.sel='+i+';G.ei=0;renderG();"><span style="font-size:18px">'+s.avatar+'</span> '+s.studentName+'</button>').join('')+
'<div style="flex:1"></div>'+
tlQ().map((q,i)=>{const k=stu.studentId+'_'+q.id;return'<button class="essay-tab '+(G.ei===i?'active':'')+'" onclick="G.ei='+i+';renderG();">'+(G.gm[k]?(G.ai.has(k)?'🤖':'✅'):'')+' Câu '+q.order+'</button>';}).join('')+
'<div style="animation:wiggle 3s ease-in-out infinite;margin-left:4px">'+B(22)+'</div></div>'+
'<div class="ggrid" style="animation:fadeIn .4s ease-out"><div class="answer-panel"><div class="answer-header"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">'+stu.avatar+'</span><span style="font-weight:800;color:var(--g800)">'+stu.studentName+'</span><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--t100);color:var(--t600)">TN: '+stu.tnScore+'đ</span></div><div style="display:flex;gap:4px"><button class="tool-btn" onclick="G.zoom=Math.max(50,G.zoom-10);renderG();">🔍➖</button><span style="font-size:12px;font-weight:700;width:40px;text-align:center;color:var(--g700)">'+G.zoom+'%</span><button class="tool-btn" onclick="G.zoom=Math.min(200,G.zoom+10);renderG();">🔍➕</button><button class="tool-btn" onclick="G.rot=(G.rot+90)%360;renderG();">🔄</button></div></div><div style="padding:24px">'+tnDetail+'<div style="border-radius:12px;padding:14px;background:var(--g50);border:2px solid var(--g200);margin-bottom:16px"><p style="font-size:13px;font-weight:700;color:var(--g700);margin-bottom:4px">📌 Câu '+eq.order+':</p><p style="font-size:15px;font-weight:600;color:var(--x800)">'+eq.content+'</p></div><div style="border:3px solid var(--g200);border-radius:12px;padding:24px;min-height:200px;background:#FFFDF7;transform:scale('+G.zoom/100+') rotate('+G.rot+'deg);transform-origin:top left;transition:transform .3s"><p style="font-size:12px;font-weight:700;color:var(--g600);margin-bottom:8px">✍️ Bài làm:</p><pre style="white-space:pre-wrap;font-size:15px;font-weight:600;color:var(--x800);font-family:var(--fb)">'+(ans?.text||'(Không có)')+'</pre>'+(ans?.hasImage?'<div style="margin-top:16px;padding:32px;border-radius:12px;text-align:center;background:var(--g50);border:3px dashed var(--g300)"><p style="font-size:13px;font-weight:700;color:var(--g600)">📸 Ảnh (mock)</p></div>':'')+'</div></div></div>'+
'<div><button class="btn-ai '+(G.grading?'pulsing':'')+'" onclick="aiOne()" '+(G.grading?'disabled':'')+'>'+(G.grading?'<span class="spinner">⏳</span> AI phân tích...':'🤖 AI Chấm Câu Này')+'</button>'+
(ia?'<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:var(--t50);border:2px solid var(--t200);margin-bottom:12px"><span>🤖</span><span style="font-size:12px;font-weight:700;color:var(--t600)">AI đã chấm — GV điều chỉnh được</span></div>':'')+
'<div class="rubric-panel"><div class="hd" style="font-weight:700;color:var(--g800);display:flex;align-items:center;gap:8px;margin-bottom:12px">📊 Rubric</div>'+
eq.rubric.map(r=>{const steps=[];for(let v=0;v<=r.maxScore;v+=.5)steps.push(v);return'<div class="rubric-item"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:var(--g800)">'+r.label+'</span><span style="font-size:11px;font-weight:600;color:var(--g600)">'+r.maxScore+'đ</span></div><div class="rubric-scores">'+steps.map(v=>{const a=rb[r.criteriaId]===v;const c=a?(v===r.maxScore?'a-max':v===0?'a-zero':'a-mid'):'';return'<button class="rubric-score-btn '+c+'" onclick="setRS(\''+r.criteriaId+'\','+v+')">'+v+'</button>';}).join('')+'</div></div>';}).join('')+
'<div class="total-score-box"><span style="font-weight:800;color:var(--g800)">Tổng:</span><span class="total-score-num">'+trs+'/'+eq.points+'</span></div></div>'+
'<div class="comment-panel"><div class="hd" style="font-weight:700;color:var(--g800);display:flex;align-items:center;gap:8px;margin-bottom:12px">💬 Lời phê & nhận xét</div><textarea class="comment-textarea" placeholder="✍️ Nhập nhận xét cho học sinh..." oninput="G.cm[gK()]=this.value">'+cm+'</textarea><div class="canned-tags">'+canned.map(c=>'<button class="canned-tag" onclick="addC(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</button>').join('')+'</div></div>'+
'<button class="btn-save-grade '+(ig?'saved':'unsaved')+'" onclick="G.gm[gK()]=true;renderG();">'+(ig?'✅ Đã lưu điểm & nhận xét':'💾 Lưu điểm & nhận xét')+'</button></div></div></div></div>';}

function setRS(c,v){const k=gK();if(!G.rs[k])G.rs[k]={};G.rs[k][c]=v;renderG();}
function addC(c){const k=gK();G.cm[k]=(G.cm[k]||'')+(G.cm[k]?' ':'')+c;renderG();}
function aiOne(){G.grading=true;renderG();setTimeout(()=>{const k=gK();const eq=tlQ()[G.ei];const{scores,cmt}=doAI(stuSubs[G.sel].studentId,eq);G.rs[k]=scores;G.cm[k]=cmt;G.gm[k]=true;G.ai.add(k);G.grading=false;renderG();},2000);}
function aiAll(){G.grading=true;renderG();setTimeout(()=>{stuSubs.forEach(stu=>{tlQ().forEach(eq=>{const k=stu.studentId+'_'+eq.id;const{scores,cmt}=doAI(stu.studentId,eq);G.rs[k]=scores;G.cm[k]=cmt;G.gm[k]=true;G.ai.add(k);});});G.grading=false;renderG();},3500);}

renderS();
</script>
</body>
